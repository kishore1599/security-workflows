name: Central DevSecOps Pipeline

on:
  workflow_call:

jobs:
  security-scans:
    name: Enterprise Security Scans
    runs-on: ubuntu-latest

    steps:

    # -----------------------------------
    # Checkout Repository
    # -----------------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -----------------------------------
    # Setup Python
    # -----------------------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # -----------------------------------
    # Install Required Tools
    # -----------------------------------
    - name: Install Semgrep
      run: |
        pip install semgrep

    - name: Install Checkov
      run: |
        pip install checkov

    # -----------------------------------
    # SAST Scan - Semgrep
    # -----------------------------------
    - name: Run SAST Scan
      run: |
        semgrep scan --config auto --json --output semgrep.json . || true

    # -----------------------------------
    # Secrets Scan - Gitleaks
    # -----------------------------------
    - name: Run Secrets Scan
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/path \
          zricethezav/gitleaks:latest detect \
          --source="/path" \
          --report-path=/path/gitleaks.json \
          --report-format=json || true

    # -----------------------------------
    # Install Trivy
    # -----------------------------------
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y

        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list

        sudo apt-get update
        sudo apt-get install trivy -y

    # -----------------------------------
    # Build Docker Image
    # -----------------------------------
    - name: Build Docker Image
      run: |
        docker build -t app-image . || true

    # -----------------------------------
    # Container Scan - Trivy
    # -----------------------------------
    - name: Run Container Scan
      run: |
        trivy image app-image --format json --output trivy.json || true

    # -----------------------------------
    # IaC Scan - Checkov
    # -----------------------------------
    - name: Run IaC Scan
      run: |
        checkov -d . -o json > checkov.json || true

    # -----------------------------------
    # Generate Unified CSV Report
    # -----------------------------------
    - name: Generate Unified Security CSV Report
      run: |
        python3 - <<EOF
        import json
        import csv
        import os

        output_file = 'security-report.csv'

        with open(output_file, 'w', newline='') as csvfile:
            writer = csv.writer(csvfile)

            writer.writerow([
                'Tool',
                'Severity',
                'File',
                'Vulnerability',
                'Details'
            ])

            # --------------------------------
            # Semgrep Results
            # --------------------------------
            if os.path.exists('semgrep.json'):
                with open('semgrep.json') as f:
                    data = json.load(f)

                for result in data.get('results', []):
                    writer.writerow([
                        'Semgrep',
                        result.get('extra', {}).get('severity'),
                        result.get('path'),
                        result.get('check_id'),
                        result.get('extra', {}).get('message')
                    ])

            # --------------------------------
            # Gitleaks Results
            # --------------------------------
            if os.path.exists('gitleaks.json'):
                with open('gitleaks.json') as f:
                    data = json.load(f)

                for item in data:
                    writer.writerow([
                        'Gitleaks',
                        'HIGH',
                        item.get('File'),
                        item.get('RuleID'),
                        'Hardcoded secret detected'
                    ])

            # --------------------------------
            # Trivy Results
            # --------------------------------
            if os.path.exists('trivy.json'):
                with open('trivy.json') as f:
                    data = json.load(f)

                for result in data.get('Results', []):
                    for vuln in result.get('Vulnerabilities', []) or []:
                        writer.writerow([
                            'Trivy',
                            vuln.get('Severity'),
                            result.get('Target'),
                            vuln.get('VulnerabilityID'),
                            vuln.get('Title')
                        ])

            # --------------------------------
            # Checkov Results
            # --------------------------------
            if os.path.exists('checkov.json'):

                with open('checkov.json') as f:
                    data = json.load(f)

                failed_checks = []

                # Handle dictionary format
                if isinstance(data, dict):
                    failed_checks = data.get('results', {}).get('failed_checks', [])

                # Handle list format
                elif isinstance(data, list):
                    for item in data:
                        if isinstance(item, dict):
                            failed_checks.extend(
                                item.get('results', {}).get('failed_checks', [])
                            )

                for item in failed_checks:
                    writer.writerow([
                        'Checkov',
                        item.get('severity'),
                        item.get('file_path'),
                        item.get('check_id'),
                        item.get('check_name')
                    ])

        print("Unified security-report.csv generated")
        EOF

    # -----------------------------------
    # Upload Unified CSV Report
    # -----------------------------------
    - name: Upload Unified Security Report
      uses: actions/upload-artifact@v4
      with:
        name: unified-security-report
        path: security-report.csv
