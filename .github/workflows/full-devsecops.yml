name: Central DevSecOps Pipeline

on:
  workflow_call:
    # secrets:
    #   SNYK_TOKEN:
    #     required: false

jobs:
  security-scans:
    name: Enterprise Security Scans
    runs-on: ubuntu-latest

    steps:

    # -----------------------------------
    # Checkout Repository
    # -----------------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -----------------------------------
    # Setup Python
    # -----------------------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # -----------------------------------
    # Setup NodeJS
    # -----------------------------------
    - name: Setup NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # -----------------------------------
    # Install Dependencies
    # -----------------------------------
    - name: Install Security Dependencies
      run: |
        pip install semgrep checkov pandas openpyxl

    # -----------------------------------
    # Detect Dockerfile
    # -----------------------------------
    - name: Detect Dockerfile
      id: docker_check
      run: |
        if find . -name "Dockerfile" | grep -q .; then
          echo "docker_exists=true" >> $GITHUB_OUTPUT
        else
          echo "docker_exists=false" >> $GITHUB_OUTPUT
        fi

    # -----------------------------------
    # Detect IaC Files
    # -----------------------------------
    - name: Detect IaC Files
      id: iac_check
      run: |
        if find . \( -name "*.tf" -o -name "*.yaml" -o -name "*.yml" \) | grep -q .; then
          echo "iac_exists=true" >> $GITHUB_OUTPUT
        else
          echo "iac_exists=false" >> $GITHUB_OUTPUT
        fi

    # -----------------------------------
    # Detect NodeJS Project
    # -----------------------------------
    - name: Detect NodeJS Project
      id: node_check
      run: |
        if find . -name "package.json" | grep -q .; then
          echo "node_exists=true" >> $GITHUB_OUTPUT
        else
          echo "node_exists=false" >> $GITHUB_OUTPUT
        fi

    # -----------------------------------
    # Run SAST Scan - Semgrep
    # -----------------------------------
    - name: Run Semgrep Scan
      run: |
        semgrep scan \
          --config auto \
          --json \
          --output semgrep.json . || true

    # -----------------------------------
    # Run Secrets Scan - Gitleaks
    # -----------------------------------
    - name: Run Gitleaks Scan
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/path \
          zricethezav/gitleaks:latest detect \
          --source="/path" \
          --report-path=/path/gitleaks.json \
          --report-format=json || true

    # -----------------------------------
    # Run SCA Scan - Snyk
    # -----------------------------------
    # - name: Run Snyk Scan
    #   if: steps.node_check.outputs.node_exists == 'true'
    #   uses: snyk/actions/node@master
    #   continue-on-error: true
    #   env:
    #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    #   with:
    #     args: --json-file-output=snyk.json

    # -----------------------------------
    # License Scan
    # -----------------------------------
    - name: Run License Scan
      if: steps.node_check.outputs.node_exists == 'true'
      run: |
        npm install -g license-checker

        license-checker \
          --json \
          > license.json || true

    # -----------------------------------
    # Install Trivy
    # -----------------------------------
    - name: Install Trivy
      if: steps.docker_check.outputs.docker_exists == 'true'
      run: |
        sudo apt-get update

        sudo apt-get install \
          wget \
          apt-transport-https \
          gnupg \
          lsb-release \
          -y

        wget -qO - \
          https://aquasecurity.github.io/trivy-repo/deb/public.key \
          | sudo apt-key add -

        echo deb \
          https://aquasecurity.github.io/trivy-repo/deb \
          $(lsb_release -sc) main \
          | sudo tee -a /etc/apt/sources.list.d/trivy.list

        sudo apt-get update

        sudo apt-get install trivy -y

    # -----------------------------------
    # Build Docker Image
    # -----------------------------------
    - name: Build Docker Image
      if: steps.docker_check.outputs.docker_exists == 'true'
      run: |
        docker build -t app-image . || true

    # -----------------------------------
    # Run Trivy Container Scan
    # -----------------------------------
    - name: Run Trivy Scan
      if: steps.docker_check.outputs.docker_exists == 'true'
      run: |
        trivy image \
          app-image \
          --format json \
          --output trivy.json || true

    # -----------------------------------
    # Run IaC Scan - Checkov
    # -----------------------------------
    - name: Run Checkov Scan
      if: steps.iac_check.outputs.iac_exists == 'true'
      run: |
        checkov -d . -o json > checkov.json || true

    # -----------------------------------
    # Install Syft
    # -----------------------------------
    - name: Install Syft
      if: steps.node_check.outputs.node_exists == 'true'
      run: |
        curl -sSfL \
          https://raw.githubusercontent.com/anchore/syft/main/install.sh \
          | sh -s -- -b /usr/local/bin

    # -----------------------------------
    # Generate SBOM
    # -----------------------------------
    - name: Generate SBOM
      if: steps.node_check.outputs.node_exists == 'true'
      run: |
        syft . -o json > sbom.json || true

    # -----------------------------------
    # Generate Excel Report
    # -----------------------------------
    - name: Generate Excel Security Report
      run: |
        python3 - <<EOF
        import json
        import os
        import pandas as pd

        writer = pd.ExcelWriter(
            'security-report.xlsx',
            engine='openpyxl'
        )

        # -------------------------------
        # Semgrep Sheet
        # -------------------------------
        semgrep_rows = []

        if os.path.exists('semgrep.json'):
            with open('semgrep.json') as f:
                data = json.load(f)

            for result in data.get('results', []):
                semgrep_rows.append({
                    'Severity': result.get('extra', {}).get('severity'),
                    'File': result.get('path'),
                    'Rule': result.get('check_id'),
                    'Details': result.get('extra', {}).get('message')
                })

        pd.DataFrame(semgrep_rows).to_excel(
            writer,
            sheet_name='Semgrep',
            index=False
        )

        # -------------------------------
        # Gitleaks Sheet
        # -------------------------------
        gitleaks_rows = []

        if os.path.exists('gitleaks.json'):
            with open('gitleaks.json') as f:
                data = json.load(f)

            for item in data:
                gitleaks_rows.append({
                    'Severity': 'HIGH',
                    'File': item.get('File'),
                    'Rule': item.get('RuleID'),
                    'Details': 'Hardcoded secret detected'
                })

        pd.DataFrame(gitleaks_rows).to_excel(
            writer,
            sheet_name='Gitleaks',
            index=False
        )

        # -------------------------------
        # Snyk Sheet
        # -------------------------------
        # snyk_rows = []

        # if os.path.exists('snyk.json'):
        #     with open('snyk.json') as f:
        #         data = json.load(f)

        #     for vuln in data.get('vulnerabilities', []):
        #         snyk_rows.append({
        #             'Severity': vuln.get('severity'),
        #             'Package': vuln.get('packageName'),
        #             'Version': vuln.get('version'),
        #             'Title': vuln.get('title')
        #         })

        # pd.DataFrame(snyk_rows).to_excel(
        #     writer,
        #     sheet_name='Snyk',
        #     index=False
        # )

        # -------------------------------
        # Trivy Sheet
        # -------------------------------
        trivy_rows = []

        if os.path.exists('trivy.json'):
            with open('trivy.json') as f:
                data = json.load(f)

            for result in data.get('Results', []):
                for vuln in result.get('Vulnerabilities', []) or []:
                    trivy_rows.append({
                        'Severity': vuln.get('Severity'),
                        'Package': vuln.get('PkgName'),
                        'CVE': vuln.get('VulnerabilityID'),
                        'Details': vuln.get('Title')
                    })

        pd.DataFrame(trivy_rows).to_excel(
            writer,
            sheet_name='Trivy',
            index=False
        )

        # -------------------------------
        # Checkov Sheet
        # -------------------------------
        checkov_rows = []

        if os.path.exists('checkov.json'):

            with open('checkov.json') as f:
                data = json.load(f)

            failed_checks = []

            if isinstance(data, dict):
                failed_checks = data.get('results', {}).get('failed_checks', [])

            elif isinstance(data, list):
                for item in data:
                    if isinstance(item, dict):
                        failed_checks.extend(
                            item.get('results', {}).get('failed_checks', [])
                        )

            for item in failed_checks:
                checkov_rows.append({
                    'Severity': item.get('severity'),
                    'File': item.get('file_path'),
                    'Rule': item.get('check_id'),
                    'Details': item.get('check_name')
                })

        pd.DataFrame(checkov_rows).to_excel(
            writer,
            sheet_name='Checkov',
            index=False
        )

        # -------------------------------
        # License Sheet
        # -------------------------------
        license_rows = []

        if os.path.exists('license.json'):
            with open('license.json') as f:
                data = json.load(f)

            for package, details in data.items():
                license_rows.append({
                    'Package': package,
                    'License': details.get('licenses'),
                    'Version': details.get('version')
                })

        pd.DataFrame(license_rows).to_excel(
            writer,
            sheet_name='Licenses',
            index=False
        )

        # -------------------------------
        # SBOM Sheet
        # -------------------------------
        sbom_rows = []

        if os.path.exists('sbom.json'):
            with open('sbom.json') as f:
                data = json.load(f)

            for artifact in data.get('artifacts', []):
                sbom_rows.append({
                    'Name': artifact.get('name'),
                    'Version': artifact.get('version'),
                    'Type': artifact.get('type')
                })

        pd.DataFrame(sbom_rows).to_excel(
            writer,
            sheet_name='SBOM',
            index=False
        )

        writer.close()

        print("security-report.xlsx generated")
        EOF

    # -----------------------------------
    # Upload Security Report
    # -----------------------------------
    - name: Upload Security Excel Report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.xlsx
