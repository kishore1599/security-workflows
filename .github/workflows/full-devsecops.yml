name: Central DevSecOps Pipeline

on:
  workflow_call:

jobs:
  security-scans:
    name: Enterprise Security Scans
    runs-on: ubuntu-latest

    steps:

    # -----------------------------------
    # Checkout Repository
    # -----------------------------------
    - name: Checkout Code
      uses: actions/checkout@v4

    # -----------------------------------
    # Setup Python
    # -----------------------------------
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # -----------------------------------
    # Install Required Tools
    # -----------------------------------
    - name: Install Semgrep
      run: |
        pip install semgrep

    - name: Install Checkov
      run: |
        pip install checkov

    # -----------------------------------
    # SAST Scan - Semgrep
    # -----------------------------------
    - name: Run SAST Scan
      run: |
        semgrep scan --config auto --json --output semgrep.json . || true

    # -----------------------------------
    # Secrets Scan - Gitleaks
    # -----------------------------------
    - name: Run Secrets Scan
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/path \
          zricethezav/gitleaks:latest detect \
          --source="/path" \
          --report-path=/path/gitleaks.json \
          --report-format=json || true

    # -----------------------------------
    # Install Trivy
    # -----------------------------------
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install wget apt-transport-https gnupg lsb-release -y

        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -

        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list

        sudo apt-get update
        sudo apt-get install trivy -y

    # -----------------------------------
    # Build Docker Image
    # -----------------------------------
    - name: Build Docker Image
      run: |
        docker build -t app-image . || true

    # -----------------------------------
    # Container Scan - Trivy
    # -----------------------------------
    - name: Run Container Scan
      run: |
        trivy image app-image --format json --output trivy.json || true

    # -----------------------------------
    # IaC Scan - Checkov
    # -----------------------------------
    - name: Run IaC Scan
      run: |
        checkov -d . -o json > checkov.json || true

    # -----------------------------------
    # Generate Excel Security Report
    # -----------------------------------
    - name: Generate Excel Security Report
      run: |
        python3 - <<EOF
        import json
        import os
        import pandas as pd

        writer = pd.ExcelWriter(
            'security-report.xlsx',
            engine='openpyxl'
        )

        # --------------------------------
        # Semgrep Sheet
        # --------------------------------
        semgrep_rows = []

        if os.path.exists('semgrep.json'):
            with open('semgrep.json') as f:
                data = json.load(f)

            for result in data.get('results', []):
                semgrep_rows.append({
                    'Severity': result.get('extra', {}).get('severity'),
                    'File': result.get('path'),
                    'Rule': result.get('check_id'),
                    'Details': result.get('extra', {}).get('message')
                })

        pd.DataFrame(semgrep_rows).to_excel(
            writer,
            sheet_name='Semgrep',
            index=False
        )

        # --------------------------------
        # Gitleaks Sheet
        # --------------------------------
        gitleaks_rows = []

        if os.path.exists('gitleaks.json'):
            with open('gitleaks.json') as f:
                data = json.load(f)

            for item in data:
                gitleaks_rows.append({
                    'Severity': 'HIGH',
                    'File': item.get('File'),
                    'Rule': item.get('RuleID'),
                    'Details': 'Hardcoded secret detected'
                })

        pd.DataFrame(gitleaks_rows).to_excel(
            writer,
            sheet_name='Gitleaks',
            index=False
        )

        # --------------------------------
        # Trivy Sheet
        # --------------------------------
        trivy_rows = []

        if os.path.exists('trivy.json'):
            with open('trivy.json') as f:
                data = json.load(f)

            for result in data.get('Results', []):
                for vuln in result.get('Vulnerabilities', []) or []:
                    trivy_rows.append({
                        'Severity': vuln.get('Severity'),
                        'File': result.get('Target'),
                        'Rule': vuln.get('VulnerabilityID'),
                        'Details': vuln.get('Title')
                    })

        pd.DataFrame(trivy_rows).to_excel(
            writer,
            sheet_name='Trivy',
            index=False
        )

        # --------------------------------
        # Checkov Sheet
        # --------------------------------
        checkov_rows = []

        if os.path.exists('checkov.json'):

            with open('checkov.json') as f:
                data = json.load(f)

            failed_checks = []

            if isinstance(data, dict):
                failed_checks = data.get('results', {}).get('failed_checks', [])

            elif isinstance(data, list):
                for item in data:
                    if isinstance(item, dict):
                        failed_checks.extend(
                            item.get('results', {}).get('failed_checks', [])
                        )

            for item in failed_checks:
                checkov_rows.append({
                    'Severity': item.get('severity'),
                    'File': item.get('file_path'),
                    'Rule': item.get('check_id'),
                    'Details': item.get('check_name')
                })

        pd.DataFrame(checkov_rows).to_excel(
            writer,
            sheet_name='Checkov',
            index=False
        )

        writer.close()

        print("security-report.xlsx generated")
        EOF

    # -----------------------------------
    # Upload Excel Report
    # -----------------------------------
    - name: Upload Security Excel Report
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: security-report.xlsx
